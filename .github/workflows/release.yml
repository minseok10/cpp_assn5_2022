name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  APP_NAME: qt-minesweeper
  QT_VERSION: 6.8.3

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-2022

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          arch: win64_msvc2022_64

      - name: Configure
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: cmake --build build --config Release

      - name: Deploy Qt runtime
        shell: cmd
        run: |
          if not exist dist mkdir dist
          copy build\Release\qt-minesweeper.exe dist\qt-minesweeper.exe
          windeployqt dist\qt-minesweeper.exe

      - name: Package
        shell: pwsh
        run: Compress-Archive -Path "dist/*" -DestinationPath "${{ env.APP_NAME }}-${{ github.ref_name }}-windows-x64.zip"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ github.ref_name }}-windows-x64
          path: ${{ env.APP_NAME }}-${{ github.ref_name }}-windows-x64.zip
          if-no-files-found: error

  build-macos:
    name: Build macOS
    runs-on: macos-15-intel

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: mac
          target: desktop
          arch: clang_64

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$Qt6_DIR"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Deploy Qt runtime and ad hoc sign app
        run: |
          macdeployqt "build/${APP_NAME}.app" -verbose=1
          codesign --force --deep --sign - "build/${APP_NAME}.app"
          codesign --verify --deep --strict "build/${APP_NAME}.app"

      - name: Package
        run: ditto -c -k --sequesterRsrc --keepParent "build/${APP_NAME}.app" "${APP_NAME}-${{ github.ref_name }}-macos.zip"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ github.ref_name }}-macos
          path: ${{ env.APP_NAME }}-${{ github.ref_name }}-macos.zip
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-macos

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            artifacts/**/*.zip \
            --title "${{ env.APP_NAME }} ${{ github.ref_name }}" \
            --notes "Automated Windows and macOS build for ${{ github.ref_name }}."
