name: Windows Qt Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          arch: 'win64_msvc2022_64'

      - name: Configure
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: cmake --build build --config Release

      - name: Deploy
        shell: cmd
        run: |
          if not exist dist mkdir dist
          copy build\Release\qt-minesweeper.exe dist\qt-minesweeper.exe
          dir dist
          windeployqt dist\qt-minesweeper.exe

      - name: Zip
        shell: pwsh
        run: Compress-Archive -Path dist\* -DestinationPath qt-minesweeper-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qt-minesweeper-windows
          path: qt-minesweeper-windows.zip
